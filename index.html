&lt;strong&gt;A barra vale 10&lt;/strong&gt; porque representa &lt;strong&gt;uma dezena&lt;/strong&gt;.&lt;br&gt;

Primeiro conte as &lt;strong&gt;barras&lt;/strong&gt; e depois os &lt;strong&gt;quadradinhos&lt;/strong&gt;.

&lt;script&gt;
const totalQuestoes=20;let questaoAtual=0,acertos=0,pontos=0,questoes=[];const emojisSimples=[&quot;🍎&quot;,&quot;⭐&quot;,&quot;🐝&quot;,&quot;🌸&quot;,&quot;🍊&quot;];
function gerarQuestaoSimples(){let a,b,soma;do{a=Math.floor(Math.random()*9)+1;b=Math.floor(Math.random()*9)+1;soma=a+b}while(soma&lt;10||soma&gt;18);return{tipo:&quot;simples&quot;,a,b,resposta:soma}}
function gerarQuestaoMaterialSemVaiUm(){let a,b,soma;do{a=Math.floor(Math.random()*40)+10;b=Math.floor(Math.random()*40)+10;soma=a+b}while(soma&gt;99||((a%10)+(b%10)&gt;9));return{tipo:&quot;material&quot;,a,b,resposta:soma}}
function iniciarQuestoes(){questoes=[];for(let i=0;i&lt;10;i++)questoes.push(gerarQuestaoSimples());for(let i=0;i&lt;10;i++)questoes.push(gerarQuestaoMaterialSemVaiUm())}
function criarLegenda(){const c=document.getElementById(&quot;legendaVisual&quot;);c.innerHTML=&quot;&quot;;const barra=document.createElement(&quot;div&quot;);barra.className=&quot;barra-dezena&quot;;for(let i=0;i&lt;10;i++)barra.appendChild(document.createElement(&quot;span&quot;));const tb=document.createElement(&quot;div&quot;);tb.innerHTML=&quot;&lt;strong&gt;= 10&lt;/strong&gt;&quot;;tb.style.fontSize=&quot;1.2rem&quot;;tb.style.color=&quot;#fff&quot;;const u=document.createElement(&quot;div&quot;);u.className=&quot;quadradinho-unidade&quot;;const tu=document.createElement(&quot;div&quot;);tu.innerHTML=&quot;&lt;strong&gt;= 1&lt;/strong&gt;&quot;;tu.style.fontSize=&quot;1.2rem&quot;;tu.style.color=&quot;#fff&quot;;c.append(barra,tb,u,tu)}
function criarBlocos(numero,id){const c=document.getElementById(id);c.innerHTML=&quot;&quot;;const dezenas=Math.floor(numero/10),unidades=numero%10;for(let d=0;d&lt;dezenas;d++){const barra=document.createElement(&quot;div&quot;);barra.className=&quot;barra-dezena&quot;;for(let i=0;i&lt;10;i++)barra.appendChild(document.createElement(&quot;span&quot;));c.appendChild(barra)}for(let u=0;u&lt;unidades;u++){const el=document.createElement(&quot;div&quot;);el.className=&quot;quadradinho-unidade&quot;;c.appendChild(el)}}
function criarEmojisSimples(numero,id,emoji){const c=document.getElementById(id);c.innerHTML=&quot;&quot;;for(let i=0;i&lt;numero;i++){const it=document.createElement(&quot;span&quot;);it.className=&quot;emoji-conta&quot;;it.textContent=emoji;c.appendChild(it)}}
function mostrarQuestao(){const q=questoes[questaoAtual];document.getElementById(&quot;questaoInfo&quot;).textContent=`Questão ${questaoAtual+1} de ${totalQuestoes}`;document.getElementById(&quot;acertosInfo&quot;).textContent=`Acertos: ${acertos}`;document.getElementById(&quot;pontosInfo&quot;).textContent=`Pontos: ${pontos} ⭐`;document.getElementById(&quot;feedback&quot;).textContent=&quot;&quot;;document.getElementById(&quot;feedback&quot;).className=&quot;feedback&quot;;if(q.tipo===&quot;simples&quot;){document.getElementById(&quot;painelLegenda&quot;).style.display=&quot;none&quot;;document.getElementById(&quot;painelSimples&quot;).style.display=&quot;block&quot;;document.getElementById(&quot;painelMaterial&quot;).style.display=&quot;none&quot;;document.getElementById(&quot;simplesA&quot;).textContent=q.a;document.getElementById(&quot;simplesB&quot;).textContent=q.b;const emojiDaConta=emojisSimples[Math.floor(Math.random()*emojisSimples.length)];criarEmojisSimples(q.a,&quot;simplesVisual1&quot;,emojiDaConta);criarEmojisSimples(q.b,&quot;simplesVisual2&quot;,emojiDaConta);document.getElementById(&quot;simplesResDez&quot;).value=&quot;&quot;;document.getElementById(&quot;simplesResUni&quot;).value=&quot;&quot;;document.getElementById(&quot;simplesResDez&quot;).disabled=false;document.getElementById(&quot;simplesResUni&quot;).disabled=false}else{document.getElementById(&quot;painelLegenda&quot;).style.display=&quot;grid&quot;;document.getElementById(&quot;painelSimples&quot;).style.display=&quot;none&quot;;document.getElementById(&quot;painelMaterial&quot;).style.display=&quot;block&quot;;const a=String(q.a).padStart(2,&quot;0&quot;),b=String(q.b).padStart(2,&quot;0&quot;);document.getElementById(&quot;topDez&quot;).textContent=a[0];document.getElementById(&quot;topUni&quot;).textContent=a[1];document.getElementById(&quot;botDez&quot;).textContent=b[0];document.getElementById(&quot;botUni&quot;).textContent=b[1];criarBlocos(q.a,&quot;visual1&quot;);criarBlocos(q.b let atual = 0;
let acertos = 0;
let pontos = 0;

function mostrarQuestao() {
  const q = questoes[atual];
  document.getElementById(&quot;questaoInfo&quot;).textContent = `Questão ${atual + 1} de ${questoes.length}`;
  document.getElementById(&quot;acertosInfo&quot;).textContent = `Acertos: ${acertos}`;
  document.getElementById(&quot;pontosInfo&quot;).textContent = `Pontos: ${pontos} ⭐`;
  document.getElementById(&quot;tituloObjeto&quot;).textContent = `${q.objeto}: que visão é esta?`;
  document.getElementById(&quot;fotoQuestao&quot;).src = q.src;
  document.getElementById(&quot;feedback&quot;).textContent = &quot;&quot;;
  document.getElementById(&quot;feedback&quot;).className = &quot;feedback&quot;;
}

function mostrarEstrelinhas() {
  const container = document.getElementById(&quot;efeitos&quot;);
  const simbolos = [&quot;⭐&quot;, &quot;🌟&quot;, &quot;✨&quot;, &quot;🎉&quot;, &quot;😊&quot;];
  for (let i = 0; i &lt; 12; i++) {
    const estrela = document.createElement(&quot;div&quot;);
    estrela.className = &quot;estrela&quot;;
    estrela.textContent = simbolos[Math.floor(Math.random() * simbolos.length)];
    estrela.style.left = Math.random() * 90 + &quot;%&quot;;
    estrela.style.top = (50 + Math.random() * 20) + &quot;%&quot;;
    estrela.style.animationDelay = (Math.random() * 0.3) + &quot;s&quot;;
    estrela.style.fontSize = (1.4 + Math.random() * 1.2) + &quot;rem&quot;;
    container.appendChild(estrela);
    setTimeout(() =&gt; estrela.remove(), 1800);
  }
}

function responder(escolha) {
  const q = questoes[atual];
  const feedback = document.getElementById(&quot;feedback&quot;);

  if (escolha === q.tipo) {
    acertos++;
    pontos += 10;
    feedback.textContent = &quot;Muito bem! Você acertou! 🎉⭐&quot;;
    feedback.className = &quot;feedback correto&quot;;
    mostrarEstrelinhas();
  } else {
    const nomes = {
      frontal: &quot;visão frontal&quot;,
      vertical: &quot;visão vertical&quot;,
      obliqua: &quot;visão oblíqua&quot;
    };
    feedback.textContent = `Resposta correta: ${nomes[q.tipo]}. 🙂`;
    feedback.className = &quot;feedback erro&quot;;
  }

  document.getElementById(&quot;acertosInfo&quot;).textContent = `Acertos: ${acertos}`;
  document.getElementById(&quot;pontosInfo&quot;).textContent = `Pontos: ${pontos} ⭐`;

  setTimeout(() =&gt; {
    atual++;
    if (atual &lt; questoes.length) {
      mostrarQuestao();
    } else {
      mostrarResultadoFinal();
    }
  }, 1500);
}

function mostrarResultadoFinal() {
  const porcentagem = Math.round((acertos / questoes.length) * 100);
  let mensagem = &quot;&quot;;
  let emoji = &quot;&quot;;

  if (porcentagem === 100) {
    mensagem = &quot;Excelente! Você identificou muito bem as visões.&quot;;
    emoji = &quot;🏆🌟&quot;;
  } else if (porcentagem &gt;= 80) {
    mensagem = &quot;Muito bom! Você entendeu bem as posições.&quot;;
    emoji = &quot;👏😊&quot;;
  } else if (porcentagem &gt;= 60) {
    mensagem = &quot;Bom trabalho! Continue observando os objetos.&quot;;
    emoji = &quot;👍✨&quot;;
  } else {
    mensagem = &quot;Vamos praticar mais um pouco. Você vai conseguir.&quot;;
    emoji = &quot;💪📚&quot;;
  }

  document.getElementById(&quot;painelQuestao&quot;).style.display = &quot;none&quot;;
  document.getElementById(&quot;feedback&quot;).style.display = &quot;none&quot;;

  const resultado = document.getElementById(&quot;resultadoFinal&quot;);
  resultado.style.display = &quot;block&quot;;
  resultado.innerHTML = `
    &lt;h2&gt;Resultado Final ${emoji}&lt;/h2&gt;
    &lt;p&gt;&lt;strong&gt;Acertos:&lt;/strong&gt; ${acertos} de ${questoes.length}&lt;/p&gt;
    &lt;p&gt;&lt;strong&gt;Pontos:&lt;/strong&gt; ${pontos} ⭐&lt;/p&gt;
    &lt;p&gt;&lt;strong&gt;Porcentagem:&lt;/strong&gt; ${porcentagem}%&lt;/p&gt;
    &lt;p&gt;${mensagem}&lt;/p&gt;
    &lt;button class=&quot;btn-reiniciar&quot; onclick=&quot;reiniciar()&quot;&gt;Jogar novamente&lt;/button&gt;
  `;
}

function reiniciar() {
  atual = 0;
  acertos = 0;
  pontos = 0;
  document.getElementById(&quot;painelQuestao&quot;).style.display = &quot;block&quot;;
  document.getElementById(&quot;feedback&quot;).style.display = &quot;block&quot;;
  document.getElementById(&quot;resultadoFinal&quot;).style.display = &quot;none&quot;;
  mostrarQuestao();
}

mostrarQuestao();

<script>
function mostrarAtividade(tipo){
  document.getElementById('mathWrap').classList.toggle('active', tipo==='math');
  document.getElementById('visionWrap').classList.toggle('active', tipo==='vision');
  window.scrollTo({top:0, behavior:'smooth'});
}
window.addEventListener('message', function(event){
  if(event.data && event.data.type === 'nextFromMath') {
    mostrarAtividade('vision');
  }
});
</script>
